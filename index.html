    <script>
        // ========== FUNCIÓN PARA SANITIZAR TEXTOS ==========
        /**
         * Elimina o normaliza los saltos de línea para evitar el error "WinAnsi cannot encode (0x000a)"
         * @param {string} texto - Texto a limpiar
         * @param {boolean} conservarSaltos - Si es true, los saltos se convierten en \n (para dividir párrafos)
         */
        function sanitizeText(texto, conservarSaltos = false) {
            if (!texto) return '';
            // Primero normalizar cualquier combinación de salto de línea a \n
            let limpio = texto.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            if (!conservarSaltos) {
                // Reemplazar todos los \n por espacios (para textos de una sola línea)
                limpio = limpio.replace(/\n/g, ' ');
            }
            return limpio;
        }

        // ... (el resto del código es idéntico, con las modificaciones indicadas abajo) ...

        // En la función applyReplacementFromModal() y editarAnotacion() ya usamos .replace(/\n/g, ' ')
        // Pero ahora usaremos sanitizeText

        function applyReplacementFromModal() {
            saveUndoState();
            // Sanitizar: sin saltos de línea
            const textoNuevo = sanitizeText(replacementTextInput.value.trim(), false);
            if (!textoNuevo || !pendingCorrection) { alert("Escribe el texto de reemplazo."); return; }
            // ...

        // En editarAnotacion:
        applyReplacementBtn.onclick = function() {

        // En insertarNotaVobo(), el texto por defecto no tiene saltos; al editar con prompt:
        div.addEventListener('dblclick', function(e) {
            e.preventDefault();
            e.stopPropagation();
            const nuevoTexto = prompt('Editar texto de la nota V°B°:', nota.text);
            if (nuevoTexto !== null) {
                // Conservar saltos de línea (se limpiarán al dibujar)
                nota.text = sanitizeText(nuevoTexto.trim(), true);
                renderNotasVobo(num);
            }
        });

        // En la generación del PDF, para la nota V°B°:
        // La función getLines ahora usa nota.text ya sanitizado con saltos normalizados.
        // Además, nos aseguramos de que cada línea no contenga \n residual (reemplazo por espacio)
        function getLines(fontSize) {
            const paragraphs = nota.text.split('\n');  // ya normalizado
            const lines = [];
            paragraphs.forEach(para => {
                // Por seguridad, quitar cualquier \n residual (no debería haber)
                const safePara = para.replace(/\n/g, ' ');
                const words = safePara.split(' ');
                let currentLine = '';
                for (const word of words) {
                    const testLine = currentLine ? currentLine + ' ' + word : word;
                    if (fontBold.widthOfTextAtSize(testLine, fontSize) < maxWidth || currentLine === '') {
                        currentLine = testLine;
                    } else {
                        lines.push(currentLine);
                        currentLine = word;
                    }
                }
                if (currentLine) lines.push(currentLine);
            });
            return lines;
        }
